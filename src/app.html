<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Dettik - Gestion de dettes et créances" />

  <!-- PWA Theme -->
  <meta name="theme-color" content="#16a34a" />
  <meta name="color-scheme" content="light" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72x72.png" />
  <link rel="shortcut icon" href="/favicon.png" />

  <!-- Apple / iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dettik" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-180x180.png" />

  <!-- Apple Splash Screens -->
  <link rel="apple-touch-startup-image" href="/splash/splash.png" />

  <!-- Windows / Microsoft -->
  <meta name="msapplication-TileColor" content="#16a34a" />
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Dettik" />
  <meta property="og:description" content="Gestion de dettes et créances" />
  <meta property="og:image" content="/icons/icon-512x512.png" />

  %sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
